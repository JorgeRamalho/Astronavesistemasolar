<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link de Teste — Viagem Sistema Solar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; min-height: 100vh; background: #0a0a1a; }
    .pagina-rede {
      max-width: 480px;
      margin: 0 auto;
      padding: 32px 20px 48px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .pagina-rede h1 {
      color: #FDB813;
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .pagina-rede .sub {
      color: #8899bb;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .link-grande {
      display: block;
      word-break: break-all;
      padding: 16px;
      background: rgba(126, 200, 227, 0.12);
      border: 2px solid rgba(126, 200, 227, 0.45);
      border-radius: 14px;
      color: #7EC8E3;
      font-family: monospace;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .link-grande:hover { background: rgba(126, 200, 227, 0.2); }
    .qr-wrap {
      display: inline-block;
      background: #fff;
      padding: 14px;
      border-radius: 16px;
      margin: 20px 0;
      min-height: 220px;
      min-width: 220px;
    }
    .qr-wrap svg { display: block; }
    .btn-copiar-grande {
      width: 100%;
      max-width: 320px;
      padding: 16px;
      margin: 8px auto;
      display: block;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #7EC8E3, #4a90d9);
      border: none;
      border-radius: 12px;
      color: #0a0a1a;
      cursor: pointer;
    }
    .status { color: #6fcf6f; font-size: 14px; min-height: 20px; margin-top: 8px; }
    .erro { color: #ff8888; padding: 16px; background: rgba(255,80,80,0.1); border-radius: 12px; }
    .lista-links { text-align: left; margin-top: 20px; }
    .lista-links a {
      display: block;
      color: #7EC8E3;
      font-family: monospace;
      font-size: 13px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      word-break: break-all;
    }
    .voltar-jogo {
      display: inline-block;
      margin-top: 24px;
      color: #8899bb;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="estrelas-bg" id="estrelas"></div>
  <div class="pagina-rede">
    <div style="font-size:48px;margin-bottom:8px">📱</div>
    <h1>Teste no Celular ou Tablet</h1>
    <p class="sub">Escaneie o QR Code ou copie o link abaixo<br>(mesma rede Wi‑Fi)</p>

    <div id="conteudo">
      <p class="sub">Carregando link…</p>
    </div>

    <a href="index.html" class="voltar-jogo">← Voltar ao jogo</a>
  </div>

  <script src="js/qrcode-lib.js"></script>
  <script>
    function criarEstrelas() {
      const c = document.getElementById('estrelas');
      for (let i = 0; i < 80; i++) {
        const e = document.createElement('div');
        e.className = 'estrela';
        e.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-delay:${Math.random()*3}s`;
        c.appendChild(e);
      }
    }

    function renderizarQr(el, url) {
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      el.innerHTML = qr.createSvgTag(6, 0);
    }

    async function copiar(texto) {
      try {
        await navigator.clipboard.writeText(texto);
        return true;
      } catch {
        const ta = document.createElement('textarea');
        ta.value = texto;
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        ta.remove();
        return ok;
      }
    }

    async function carregar() {
      const box = document.getElementById('conteudo');
      let info = null;

      try {
        const r = await fetch('/api/rede-info', { cache: 'no-store' });
        if (r.ok) info = await r.json();
      } catch (e) {}

      if (!info || !info.primary) {
        box.innerHTML = '<div class="erro">Servidor não encontrado.<br><br>Execute <strong>start-teste.bat</strong> ou <strong>node serve.js</strong> na pasta do projeto.</div>';
        return;
      }

      const url = info.primary;
      box.innerHTML = `
        <a class="link-grande" href="${url}" id="link-principal">${url}</a>
        <div class="qr-wrap" id="qr"></div>
        <button class="btn-copiar-grande" id="btn-copiar">📋 Copiar link</button>
        <p class="status" id="status">Aponte a câmera do celular para o QR Code</p>
        ${info.links.length > 1 ? `
          <div class="lista-links">
            <p class="sub" style="margin-bottom:8px">Outros endereços nesta rede:</p>
            ${info.links.map(l => `<a href="${l.url}">${l.url} <span style="color:#8899bb">(${l.interface})</span></a>`).join('')}
          </div>
        ` : ''}
      `;

      renderizarQr(document.getElementById('qr'), url);

      document.getElementById('btn-copiar').addEventListener('click', async () => {
        const ok = await copiar(url);
        document.getElementById('status').textContent = ok ? '✅ Link copiado!' : 'Copie manualmente o link acima.';
      });
    }

    criarEstrelas();
    carregar();
  </script>
</body>
</html>
